{{- range $name, $svc := .Values.services }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ printf "%s-%s-secret" $.Release.Name $name | trunc 63 | trimSuffix "-" }}
type: Opaque
stringData:
{{- if $svc.secret }}
{{ toYaml $svc.secret | indent 2 }}
{{- else }}
  JWT_SECRET: "dev-only-change-me"
{{- end }}
{{- end }}
