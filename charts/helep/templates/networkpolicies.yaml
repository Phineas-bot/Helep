{{- range $name, $svc := .Values.services }}
{{- if $svc.networkPolicy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ printf "%s-%s-netpol" $.Release.Name $name | trunc 63 | trimSuffix "-" }}
spec:
  podSelector:
    matchLabels:
      app: {{ printf "%s-%s" $.Release.Name $name | trunc 63 | trimSuffix "-" }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
{{- end }}
{{- end }}
