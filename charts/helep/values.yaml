global:
  imagePullPolicy: IfNotPresent
  imagePullSecrets: []

defaultResources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "200m"

monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    releaseLabel: kube-prometheus-stack
  grafana:
    dashboardLabel: grafana_dashboard

# Per-service defaults. Can be overridden by environment-specific values files.
services:
  user-service:
    image:
      # docker-compose builds local images with the project_service name (e.g. helep_user-service)
      repository: helep_user-service
      tag: latest
    replicaCount: 1
    service:
      port: 8001
    persistence:
      enabled: true
      size: 100Mi
    ingress:
      enabled: false
      host: ""
    hpa:
      minReplicas: 1
      maxReplicas: 3
      cpuUtilization: 60
    networkPolicy:
      enabled: false
    resources: {}
    env: {}
    secret: {}
    terminationGracePeriodSeconds: 30

  sos-service:
